apiVersion: v1
kind: ConfigMap
metadata:
  name: bazelrc
  namespace: <username>
data:
  .bazelrc: |
    build --local_ram_resources=HOST_RAM*0.5 
    build --local_cpu_resources=4 
    build --disk_cache=/root/bazel-cache 
    build --compilation_mode=dbg
    build --spawn_strategy=local
    build --genrule_strategy=local
