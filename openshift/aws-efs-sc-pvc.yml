apiVersion: v1
kind: PersistentVolume
metadata:
  name: efs-pv
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-0595be420d464538b
    volumeAttributes:
      encryptInTransit: "false"
  mountOptions:
  - noresvport
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pytorch-eco-storage-efs-<username>
  namespace: <username>
spec:
  resources:
    requests:
      storage: 200Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  volumeName: efs-pv