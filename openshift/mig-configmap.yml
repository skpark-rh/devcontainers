apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-mig-config
  namespace: nvidia-gpu-operator
data:
  config.yaml: |
    version: v1
    mig-configs:
      custom-mix:
        - devices: [0, 1]
          mig-enabled: false
          mig-devices: {}
        - devices: [2,3,4,5]
          mig-enabled: true
          mig-devices:
            1g.18gb: 7
        - devices: [6,7]
          mig-enabled: true
          mig-devices:
            2g.35gb: 3