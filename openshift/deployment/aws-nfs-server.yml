apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      containers:
      - name: nfs-server
        image: registry.k8s.io/volume-nfs:0.8
        ports:
        - containerPort: 2049
        - containerPort: 20048
        - containerPort: 111
        securityContext:
          privileged: true
        volumeMounts:
        - name: data
          mountPath: /exports
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: nfs-backing-storage
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
spec:
  clusterIP: 172.30.99.102
  ports:
  - name: nfs
    port: 2049
  - name: mountd
    port: 20048
  - name: rpcbind
    port: 111
  selector:
    app: nfs-server
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-backing-storage
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
  storageClassName: gp3-csi