apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: <username>-access
  namespace: <username>
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["<username>-git-ssh-key", "<username>-gcloud-config"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: <username>-access-binding
  namespace: <username>
subjects:
  - kind: User
    name: <email>
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: <username>-access
  apiGroup: rbac.authorization.k8s.io
