name: Build and Push to Quay

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4

      - name: Login to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          build-args: PY_VER=${{ matrix.python-version }}
          tags: |
            quay.io/rh-ee-sampark/devcontainers:py${{ matrix.python-version }}
            ${{ matrix.python-version == '3.10' && 'quay.io/rh-ee-sampark/devcontainers:latest' || '' }}